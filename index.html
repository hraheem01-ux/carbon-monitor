<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Recycle Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #071633 0%, #081226 100%);
      color: white;
      text-align: center;
      padding: 24px;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: 52px;
      font-weight: 700;
    }

    .subtitle {
      color: #d6def1;
      font-size: 20px;
      margin-bottom: 12px;
    }

    .connection-banner {
      max-width: 1350px;
      margin: 0 auto 24px;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .connection-banner.online {
      background: rgba(34, 197, 94, 0.14);
      border-color: rgba(34, 197, 94, 0.35);
      color: #86efac;
    }

    .connection-banner.offline {
      background: rgba(239, 68, 68, 0.14);
      border-color: rgba(239, 68, 68, 0.35);
      color: #fca5a5;
    }

    .connection-banner.stale {
      background: rgba(245, 158, 11, 0.14);
      border-color: rgba(245, 158, 11, 0.35);
      color: #fcd34d;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      max-width: 1350px;
      margin: auto;
    }

    .card {
      background: rgba(29, 43, 72, 0.95);
      border-radius: 22px;
      padding: 26px 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: 0.25s ease;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .label {
      font-size: 16px;
      color: #b9c6e6;
      margin-bottom: 14px;
    }

    .value {
      font-size: 56px;
      font-weight: bold;
      line-height: 1.1;
    }

    .unit {
      font-size: 18px;
      color: #dbe7ff;
      margin-top: 8px;
    }

    .status {
      margin-top: 10px;
      font-size: 15px;
      font-weight: bold;
    }

    .good {
      color: #22c55e;
      border-color: rgba(34, 197, 94, 0.35);
    }

    .mid {
      color: #f59e0b;
      border-color: rgba(245, 158, 11, 0.35);
    }

    .bad {
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.35);
    }

    .neutral {
      color: #ffffff;
    }

    .offline-card {
      border-color: rgba(148, 163, 184, 0.35) !important;
    }

    .offline-text {
      color: #94a3b8 !important;
    }

    .chart-wrap {
      max-width: 1350px;
      margin: 28px auto 0;
      background: rgba(29, 43, 72, 0.95);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      text-align: left;
    }

    .chart-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 14px;
      color: white;
      text-align: center;
    }

    canvas {
      max-height: 430px;
    }

    .footer {
      margin-top: 22px;
      color: #b9c6e6;
      font-size: 18px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 34px;
      }

      .value {
        font-size: 42px;
      }

      .subtitle {
        font-size: 16px;
      }

      .connection-banner {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <h1>Carbon Recycle Monitor</h1>
  <div class="subtitle">Live sensor readings from anywhere in the world</div>
  <div class="connection-banner" id="connectionBanner">Checking sensor connection...</div>

  <div class="grid">
    <div class="card" id="card-in">
      <div class="label">CO₂ IN</div>
      <div class="value neutral" id="co2_in">--</div>
      <div class="unit">ppm</div>
      <div class="status" id="co2_in_status">--</div>
    </div>

    <div class="card" id="card-out">
      <div class="label">CO₂ OUT</div>
      <div class="value neutral" id="co2_out">--</div>
      <div class="unit">ppm</div>
      <div class="status" id="co2_out_status">--</div>
    </div>

    <div class="card" id="card-diff">
      <div class="label">Difference</div>
      <div class="value neutral" id="difference">--</div>
      <div class="unit">ppm</div>
      <div class="status" id="difference_status">--</div>
    </div>

    <div class="card" id="card-eff">
      <div class="label">Filter Efficiency</div>
      <div class="value neutral" id="efficiency">--</div>
      <div class="unit">%</div>
      <div class="status" id="efficiency_status">--</div>
    </div>

    <div class="card" id="card-temp">
      <div class="label">Temperature</div>
      <div class="value neutral" id="temperature">--</div>
      <div class="unit">°C</div>
      <div class="status" id="temperature_status">--</div>
    </div>

    <div class="card" id="card-hum">
      <div class="label">Humidity</div>
      <div class="value neutral" id="humidity">--</div>
      <div class="unit">%</div>
      <div class="status" id="humidity_status">--</div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="chart-title">Live Trend - Last 30 Readings</div>
    <canvas id="carbonChart"></canvas>
  </div>

  <div class="footer" id="lastUpdate">Last update: --</div>

  <script>
    const SUPABASE_URL = "https://khnlwlgrwdizdrsjqoor.supabase.co";
    const SUPABASE_KEY = "sb_publishable__a1n5TOEUd8CwIPH0rrLGA_ADEPJ6tj";

    const ONLINE_THRESHOLD_SEC = 20; // أقل من 20 ثانية = Online
    const STALE_THRESHOLD_SEC = 60;  // من 20 إلى 60 ثانية = Stale / Delayed
                                   // أكثر من 60 ثانية = Offline

    let carbonChart;

    function setCardState(cardId, valueId, statusId, level, statusText) {
      const card = document.getElementById(cardId);
      const value = document.getElementById(valueId);
      const status = document.getElementById(statusId);

      card.classList.remove("good", "mid", "bad", "offline-card");
      value.classList.remove("good", "mid", "bad", "neutral", "offline-text");
      status.classList.remove("good", "mid", "bad", "neutral", "offline-text");

      card.classList.add(level);
      value.classList.add(level);
      status.classList.add(level);
      status.textContent = statusText;
    }

    function setAllCardsOffline(statusText) {
      const cards = [
        ["card-in", "co2_in", "co2_in_status"],
        ["card-out", "co2_out", "co2_out_status"],
        ["card-diff", "difference", "difference_status"],
        ["card-eff", "efficiency", "efficiency_status"],
        ["card-temp", "temperature", "temperature_status"],
        ["card-hum", "humidity", "humidity_status"]
      ];

      cards.forEach(([cardId, valueId, statusId]) => {
        const card = document.getElementById(cardId);
        const value = document.getElementById(valueId);
        const status = document.getElementById(statusId);

        card.classList.remove("good", "mid", "bad");
        value.classList.remove("good", "mid", "bad", "neutral");
        status.classList.remove("good", "mid", "bad", "neutral");

        card.classList.add("offline-card");
        value.classList.add("offline-text");
        status.classList.add("offline-text");
        status.textContent = statusText;
      });
    }

    function classifyCO2(ppm) {
      if (ppm <= 600) return { level: "good", text: "Excellent air" };
      if (ppm <= 1000) return { level: "mid", text: "Moderate air" };
      return { level: "bad", text: "High CO₂" };
    }

    function classifyEfficiency(eff) {
      if (eff >= 25) return { level: "good", text: "Strong filter performance" };
      if (eff >= 10) return { level: "mid", text: "Moderate filter performance" };
      return { level: "bad", text: "Weak filter performance" };
    }

    function classifyDifference(diff) {
      if (diff > 100) return { level: "good", text: "Clear reduction" };
      if (diff > 20) return { level: "mid", text: "Small reduction" };
      return { level: "bad", text: "No useful reduction" };
    }

    function classifyTemperature(temp) {
      if (temp >= 20 && temp <= 30) return { level: "good", text: "Normal temperature" };
      if ((temp >= 15 && temp < 20) || (temp > 30 && temp <= 35)) return { level: "mid", text: "Acceptable temperature" };
      return { level: "bad", text: "Temperature alert" };
    }

    function classifyHumidity(hum) {
      if (hum >= 35 && hum <= 60) return { level: "good", text: "Comfort humidity" };
      if ((hum >= 25 && hum < 35) || (hum > 60 && hum <= 70)) return { level: "mid", text: "Acceptable humidity" };
      return { level: "bad", text: "Humidity alert" };
    }

    function safeNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function formatValue(value, decimals = 0, fallback = "--") {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return decimals > 0 ? n.toFixed(decimals) : String(Math.round(n));
    }

    function getSecondsSince(dateString) {
      if (!dateString) return null;
      const ts = new Date(dateString).getTime();
      if (Number.isNaN(ts)) return null;
      return Math.floor((Date.now() - ts) / 1000);
    }

    function formatAge(seconds) {
      if (seconds === null || seconds < 0) return "--";
      if (seconds < 60) return `${seconds}s ago`;

      const minutes = Math.floor(seconds / 60);
      const remainSec = seconds % 60;
      if (minutes < 60) return `${minutes}m ${remainSec}s ago`;

      const hours = Math.floor(minutes / 60);
      const remainMin = minutes % 60;
      return `${hours}h ${remainMin}m ago`;
    }

    function getConnectionState(ageSec) {
      if (ageSec === null) {
        return {
          state: "offline",
          text: "No valid timestamp received"
        };
      }

      if (ageSec <= ONLINE_THRESHOLD_SEC) {
        return {
          state: "online",
          text: `Sensor online • latest reading ${formatAge(ageSec)}`
        };
      }

      if (ageSec <= STALE_THRESHOLD_SEC) {
        return {
          state: "stale",
          text: `No fresh reading • showing last saved data (${formatAge(ageSec)})`
        };
      }

      return {
        state: "offline",
        text: `Sensor offline • showing old saved reading (${formatAge(ageSec)})`
      };
    }

    function updateConnectionBanner(connectionInfo) {
      const banner = document.getElementById("connectionBanner");
      banner.classList.remove("online", "offline", "stale");
      banner.classList.add(connectionInfo.state);
      banner.textContent = connectionInfo.text;
    }

    function updateChart(rows) {
      const labels = rows.map((row, i) => {
        if (row.created_at) {
          const d = new Date(row.created_at);
          if (!Number.isNaN(d.getTime())) {
            return d.toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit"
            });
          }
        }
        return `${i + 1}`;
      });

      const inData = rows.map(r => safeNumber(r.co2_in, 0));
      const outData = rows.map(r => safeNumber(r.co2_out, 0));
      const effData = rows.map(r => safeNumber(r.efficiency, 0));

      const ctx = document.getElementById("carbonChart").getContext("2d");

      if (carbonChart) {
        carbonChart.destroy();
      }

      carbonChart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "CO₂ IN",
              data: inData,
              borderColor: "#60a5fa",
              backgroundColor: "rgba(96,165,250,0.15)",
              tension: 0.3,
              fill: false,
              borderWidth: 3,
              pointRadius: 2
            },
            {
              label: "CO₂ OUT",
              data: outData,
              borderColor: "#22c55e",
              backgroundColor: "rgba(34,197,94,0.15)",
              tension: 0.3,
              fill: false,
              borderWidth: 3,
              pointRadius: 2
            },
            {
              label: "Efficiency %",
              data: effData,
              borderColor: "#f59e0b",
              backgroundColor: "rgba(245,158,11,0.15)",
              tension: 0.3,
              fill: false,
              borderWidth: 3,
              pointRadius: 2,
              yAxisID: "y1"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                color: "white",
                font: {
                  size: 14
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: "#dbe7ff"
              },
              grid: {
                color: "rgba(255,255,255,0.08)"
              }
            },
            y: {
              position: "left",
              ticks: {
                color: "#dbe7ff"
              },
              grid: {
                color: "rgba(255,255,255,0.08)"
              },
              title: {
                display: true,
                text: "CO₂ ppm",
                color: "#dbe7ff"
              }
            },
            y1: {
              position: "right",
              ticks: {
                color: "#ffd28a"
              },
              grid: {
                drawOnChartArea: false
              },
              title: {
                display: true,
                text: "Efficiency %",
                color: "#ffd28a"
              }
            }
          }
        }
      });
    }

    async function loadReadings() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/carbon_readings?select=*&order=created_at.desc&limit=30`,
          {
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        if (!data || !data.length) {
          document.getElementById("lastUpdate").textContent = "Last update: no data";
          updateConnectionBanner({
            state: "offline",
            text: "No readings found in database"
          });
          return;
        }

        const latest = data[0];
        const chartRows = [...data].reverse();

        const co2In = safeNumber(latest.co2_in, NaN);
        const co2Out = safeNumber(latest.co2_out, NaN);
        const difference = safeNumber(latest.difference, NaN);
        const efficiency = safeNumber(latest.efficiency, NaN);
        const temperature = safeNumber(latest.temperature, NaN);
        const humidity = safeNumber(latest.humidity, NaN);

        document.getElementById("co2_in").textContent = formatValue(co2In, 0);
        document.getElementById("co2_out").textContent = formatValue(co2Out, 0);
        document.getElementById("difference").textContent = formatValue(difference, 0, "0");
        document.getElementById("efficiency").textContent = formatValue(efficiency, 2);
        document.getElementById("temperature").textContent = formatValue(temperature, 2);
        document.getElementById("humidity").textContent = formatValue(humidity, 1);

        const ageSec = getSecondsSince(latest.created_at);
        const connectionInfo = getConnectionState(ageSec);

        updateConnectionBanner(connectionInfo);

        if (connectionInfo.state === "online") {
          const inClass = classifyCO2(co2In);
          const outClass = classifyCO2(co2Out);
          const diffClass = classifyDifference(difference);
          const effClass = classifyEfficiency(efficiency);
          const tempClass = classifyTemperature(temperature);
          const humClass = classifyHumidity(humidity);

          setCardState("card-in", "co2_in", "co2_in_status", inClass.level, inClass.text);
          setCardState("card-out", "co2_out", "co2_out_status", outClass.level, outClass.text);
          setCardState("card-diff", "difference", "difference_status", diffClass.level, diffClass.text);
          setCardState("card-eff", "efficiency", "efficiency_status", effClass.level, effClass.text);
          setCardState("card-temp", "temperature", "temperature_status", tempClass.level, tempClass.text);
          setCardState("card-hum", "humidity", "humidity_status", humClass.level, humClass.text);
        } else if (connectionInfo.state === "stale") {
          setAllCardsOffline("Stale reading");
        } else {
          setAllCardsOffline("Sensor offline");
        }

        document.getElementById("lastUpdate").textContent =
          "Last update: " + (latest.created_at ?? "--") +
          (ageSec !== null ? ` • ${formatAge(ageSec)}` : "");

        updateChart(chartRows);
      } catch (err) {
        console.error("Load error:", err);
        updateConnectionBanner({
          state: "offline",
          text: "Connection error while loading data"
        });
        setAllCardsOffline("Connection error");
        document.getElementById("lastUpdate").textContent = "Last update: failed to load";
      }
    }

    loadReadings();
    setInterval(loadReadings, 5000);
  </script>
</body>
</html>
